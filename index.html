<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daylog — Daily Hour Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:    #f5f0e8;
      --paper:    #fdfaf4;
      --ink:      #1c1a17;
      --ink-mid:  #5a554c;
      --ink-light:#9c9589;
      --rule:     #e2ddd4;
      --accent:   #c0622a;
      --accent-bg:#fdf0e8;
      --shadow:   0 2px 12px rgba(28,26,23,0.07);
      --shadow-lg:0 8px 32px rgba(28,26,23,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(192,98,42,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(45,122,79,0.05) 0%, transparent 60%);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .45s ease both; }
    .fade-up:nth-child(1) { animation-delay: .04s; }
    .fade-up:nth-child(2) { animation-delay: .10s; }
    .fade-up:nth-child(3) { animation-delay: .16s; }
    .fade-up:nth-child(4) { animation-delay: .22s; }
    .fade-up:nth-child(5) { animation-delay: .28s; }

    /* HEADER */
    header {
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: var(--shadow);
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      color: var(--ink);
    }
    .logo em { color: var(--accent); font-style: italic; }

    .header-nav { display: flex; gap: 4px; }
    .nav-btn {
      background: none; border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      color: var(--ink-mid);
      padding: 7px 16px; cursor: pointer;
      border-radius: 6px;
      transition: background .15s, color .15s;
    }
    .nav-btn:hover { background: var(--cream); color: var(--ink); }
    .nav-btn.active { background: var(--ink); color: var(--paper); }

    /* PAGES */
    .page { display: none; }
    .page.active { display: block; }
    .container { max-width: 780px; margin: 0 auto; padding: 36px 24px 80px; }

    /* DATE NAV */
    .date-nav {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .date-heading { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--ink); }
    .date-heading .weekday {
      font-size: 11px; font-family: 'DM Sans', sans-serif;
      font-weight: 500; color: var(--ink-light);
      letter-spacing: 1.5px; text-transform: uppercase;
      display: block; margin-bottom: 3px;
    }
    .date-btns { display: flex; align-items: center; gap: 8px; }
    .arrow-btn {
      width: 34px; height: 34px;
      background: var(--paper); border: 1px solid var(--rule);
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: var(--ink-mid);
      box-shadow: var(--shadow); transition: all .15s;
    }
    .arrow-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .today-btn {
      background: var(--paper); border: 1px solid var(--rule);
      font-family: 'DM Sans', sans-serif; font-size: 12px;
      font-weight: 500; color: var(--ink-mid);
      padding: 6px 14px; border-radius: 20px; cursor: pointer;
      box-shadow: var(--shadow); transition: all .15s;
    }
    .today-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    /* TOTAL BAR */
    .total-bar {
      background: var(--paper); border: 1px solid var(--rule);
      border-radius: 12px; padding: 18px 24px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; box-shadow: var(--shadow);
    }
    .total-label { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-light); }
    .total-context { font-size: 12px; color: var(--ink-light); margin-top: 3px; }
    .total-val { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--accent); }
    .total-val small { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink-light); margin-left: 4px; }

    /* TASK ROWS */
    .task-list { display: flex; flex-direction: column; gap: 9px; margin-bottom: 16px; }

    .task-row {
      background: var(--paper); border: 1px solid var(--rule);
      border-radius: 10px; padding: 14px 18px;
      display: grid; grid-template-columns: 32px 1fr 150px 34px;
      align-items: center; gap: 12px;
      box-shadow: var(--shadow);
      transition: box-shadow .2s, transform .2s;
      animation: fadeUp .35s ease both;
    }
    .task-row:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }

    .cat-dot {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .cat-work     { background:#fde8d8; }
    .cat-learning { background:#dff0eb; }
    .cat-personal { background:#e8e4f8; }
    .cat-health   { background:#fde8ec; }
    .cat-other    { background:#e8e8e8; }

    .task-name { font-size: 15px; font-weight: 600; color: var(--ink); }
    .task-cat-label { font-size: 11px; color: var(--ink-light); margin-top: 2px; }

    .hrs-wrap {
      display: flex; align-items: center; gap: 6px;
      background: var(--cream); border: 1.5px solid var(--rule);
      border-radius: 8px; padding: 6px 10px;
      transition: border-color .2s, background .2s;
    }
    .hrs-wrap:focus-within { border-color: var(--accent); background: var(--accent-bg); }
    .hrs-input {
      width: 56px; background: none; border: none; outline: none;
      font-family: 'DM Serif Display', serif; font-size: 20px;
      color: var(--ink); text-align: right;
    }
    .hrs-input::placeholder { color: var(--rule); }
    .hrs-unit { font-size: 12px; color: var(--ink-light); font-weight: 500; }

    .btn-del {
      width: 30px; height: 30px; background: none;
      border: 1px solid transparent; border-radius: 6px;
      cursor: pointer; color: var(--ink-light); font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .btn-del:hover { background: #fdecea; border-color: #f5c2c0; color: #c0392b; }

    /* ADD ROW */
    .add-row {
      background: var(--paper); border: 1.5px dashed var(--rule);
      border-radius: 10px; padding: 13px 18px;
      display: grid; grid-template-columns: 1fr auto auto;
      gap: 10px; align-items: center;
      transition: border-color .2s;
    }
    .add-row:focus-within { border-color: var(--accent); border-style: solid; }
    .add-input {
      background: none; border: none; outline: none;
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink);
    }
    .add-input::placeholder { color: var(--ink-light); }
    .add-select {
      background: none; border: none; outline: none;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: var(--ink-mid); cursor: pointer;
    }
    .btn-add {
      background: var(--ink); color: var(--paper); border: none;
      border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600; padding: 8px 18px;
      cursor: pointer; white-space: nowrap;
      transition: background .15s, transform .1s;
    }
    .btn-add:hover { background: var(--accent); }
    .btn-add:active { transform: scale(0.97); }

    /* EMPTY */
    .empty {
      text-align: center; padding: 44px 24px;
      color: var(--ink-light);
    }
    .empty-icon { font-size: 34px; margin-bottom: 12px; }
    .empty p { font-size: 14px; line-height: 1.7; }

    /* SUMMARY */
    .page-title { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--ink); margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: var(--ink-light); margin-bottom: 28px; }

    .period-tabs { display: flex; gap: 6px; margin-bottom: 24px; }
    .p-tab {
      background: var(--paper); border: 1px solid var(--rule);
      border-radius: 20px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500; color: var(--ink-mid);
      padding: 7px 18px; cursor: pointer; transition: all .15s;
    }
    .p-tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .p-tab:hover:not(.active) { border-color: var(--ink-mid); }

    .stat-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card {
      background: var(--paper); border: 1px solid var(--rule);
      border-radius: 12px; padding: 18px 20px; box-shadow: var(--shadow);
    }
    .stat-card-label { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-light); margin-bottom: 8px; }
    .stat-card-val { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--ink); }
    .stat-card-val small { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink-light); margin-left: 3px; }

    .breakdown {
      background: var(--paper); border: 1px solid var(--rule);
      border-radius: 12px; overflow: hidden; box-shadow: var(--shadow);
    }
    .bk-header {
      display: grid; grid-template-columns: 32px 1fr 70px 120px;
      gap: 14px; padding: 10px 20px;
      background: var(--cream); border-bottom: 1px solid var(--rule);
    }
    .bk-header span { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-light); }
    .bk-row {
      display: grid; grid-template-columns: 32px 1fr 70px 120px;
      gap: 14px; padding: 13px 20px;
      border-bottom: 1px solid var(--rule);
      align-items: center; transition: background .12s;
    }
    .bk-row:last-child { border-bottom: none; }
    .bk-row:hover { background: var(--cream); }
    .bk-name { font-size: 14px; font-weight: 500; }
    .bk-sub { font-size: 11px; color: var(--ink-light); margin-top: 2px; }
    .bk-hrs { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--accent); text-align: right; }
    .bar-wrap { height: 4px; background: var(--rule); border-radius: 2px; }
    .bar-fill { height: 4px; border-radius: 2px; transition: width .6s cubic-bezier(.4,0,.2,1); }

    /* MANAGE */
    .saved-list { display: flex; flex-direction: column; gap: 9px; margin-bottom: 24px; }
    .saved-row {
      background: var(--paper); border: 1px solid var(--rule);
      border-radius: 10px; padding: 13px 18px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: var(--shadow); animation: fadeUp .35s ease both;
    }
    .saved-name { flex: 1; font-size: 14px; font-weight: 500; }
    .saved-badge {
      font-size: 11px; color: var(--ink-light);
      background: var(--cream); border: 1px solid var(--rule);
      padding: 3px 10px; border-radius: 12px;
    }

    .new-form {
      background: var(--paper); border: 1.5px dashed var(--rule);
      border-radius: 12px; padding: 22px 22px;
    }
    .new-form h3 { font-family: 'DM Serif Display', serif; font-size: 18px; margin-bottom: 16px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; }
    .fl label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-light); margin-bottom: 6px; }
    .fl input, .fl select {
      width: 100%; background: var(--cream); border: 1.5px solid var(--rule);
      border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--ink); padding: 9px 12px; outline: none;
      transition: border-color .2s;
    }
    .fl input:focus, .fl select:focus { border-color: var(--accent); }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .container { padding: 24px 14px 60px; }
      .stat-cards { grid-template-columns: 1fr 1fr; }
      .task-row { grid-template-columns: 30px 1fr 130px 30px; gap: 8px; }
      .add-row { grid-template-columns: 1fr auto; }
      .add-select { display: none; }
      .form-grid { grid-template-columns: 1fr; }
      .bk-row, .bk-header { grid-template-columns: 30px 1fr 60px; }
      .bar-wrap { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Day<em>log</em></div>
  <div class="header-nav">
    <button class="nav-btn active" onclick="showPage('daily', this)">Daily Log</button>
    <button class="nav-btn" onclick="showPage('summary', this)">Summary</button>
    <button class="nav-btn" onclick="showPage('manage', this)">My Tasks</button>
  </div>
</header>

<!-- DAILY LOG -->
<div class="page active" id="page-daily">
  <div class="container">
    <div class="date-nav fade-up">
      <div class="date-heading">
        <span class="weekday" id="weekdayLbl"></span>
        <span id="dateLbl"></span>
      </div>
      <div class="date-btns">
        <button class="arrow-btn" onclick="changeDay(-1)">←</button>
        <button class="today-btn" onclick="goToday()">Today</button>
        <button class="arrow-btn" onclick="changeDay(1)">→</button>
      </div>
    </div>

    <div class="total-bar fade-up">
      <div>
        <div class="total-label">Hours Logged</div>
        <div class="total-context" id="totalCtx">Nothing logged yet</div>
      </div>
      <div class="total-val" id="totalVal">0 <small>hrs</small></div>
    </div>

    <div class="task-list fade-up" id="taskList"></div>

    <div class="add-row fade-up">
      <input class="add-input" id="quickName" placeholder="Add a task for today…" list="taskSuggest" />
      <datalist id="taskSuggest"></datalist>
      <select class="add-select" id="quickCat">
        <option value="work">💼 Work</option>
        <option value="learning">📚 Learning</option>
        <option value="personal">🌿 Personal</option>
        <option value="health">💪 Health</option>
        <option value="other">📌 Other</option>
      </select>
      <button class="btn-add" onclick="quickAdd()">+ Add</button>
    </div>
  </div>
</div>

<!-- SUMMARY -->
<div class="page" id="page-summary">
  <div class="container">
    <div class="fade-up">
      <div class="page-title">Summary</div>
      <div class="page-sub">Your hours, broken down by task.</div>
    </div>
    <div class="period-tabs fade-up">
      <button class="p-tab active" onclick="setPeriod('week',this)">This Week</button>
      <button class="p-tab" onclick="setPeriod('month',this)">This Month</button>
      <button class="p-tab" onclick="setPeriod('all',this)">All Time</button>
    </div>
    <div class="stat-cards fade-up" id="statCards"></div>
    <div class="breakdown fade-up" id="breakdown"></div>
  </div>
</div>

<!-- MANAGE TASKS -->
<div class="page" id="page-manage">
  <div class="container">
    <div class="fade-up">
      <div class="page-title">My Tasks</div>
      <div class="page-sub">Define your recurring tasks once — log hours against them every day.</div>
    </div>
    <div class="saved-list fade-up" id="savedList"></div>
    <div class="new-form fade-up">
      <h3>Add a New Task</h3>
      <div class="form-grid">
        <div class="fl">
          <label>Task Name</label>
          <input type="text" id="newName" placeholder="e.g. Deep work" />
        </div>
        <div class="fl">
          <label>Category</label>
          <select id="newCat">
            <option value="work">💼 Work</option>
            <option value="learning">📚 Learning</option>
            <option value="personal">🌿 Personal</option>
            <option value="health">💪 Health</option>
            <option value="other">📌 Other</option>
          </select>
        </div>
        <button class="btn-add" onclick="addTask()">+ Save</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const DEFAULT = {
  tasks: [
    { id:'t1', name:'Deep Work',       cat:'work' },
    { id:'t2', name:'Emails & Calls',  cat:'work' },
    { id:'t3', name:'Learning',        cat:'learning' },
  ],
  log: {}
};

let S = JSON.parse(localStorage.getItem('daylog3') || 'null') || JSON.parse(JSON.stringify(DEFAULT));
let curDate = toKey(new Date());
let period  = 'week';

const CAT = {
  work:     { emoji:'💼', label:'Work',     cls:'cat-work',     color:'#c0622a' },
  learning: { emoji:'📚', label:'Learning', cls:'cat-learning', color:'#2d7a4f' },
  personal: { emoji:'🌿', label:'Personal', cls:'cat-personal', color:'#5b4fcf' },
  health:   { emoji:'💪', label:'Health',   cls:'cat-health',   color:'#c0384b' },
  other:    { emoji:'📌', label:'Other',    cls:'cat-other',    color:'#777' },
};

function save() { localStorage.setItem('daylog3', JSON.stringify(S)); }
function toKey(d) { return d.toISOString().slice(0,10); }

// ── NAV ───────────────────────────────────────────────────────────────────
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  if (id === 'summary') renderSummary();
  if (id === 'manage')  renderManage();
}

// ── DATE ──────────────────────────────────────────────────────────────────
function changeDay(d) {
  const dt = new Date(curDate + 'T12:00:00');
  dt.setDate(dt.getDate() + d);
  curDate = toKey(dt);
  renderDaily();
}
function goToday() { curDate = toKey(new Date()); renderDaily(); }

function headingFor(key) {
  const d = new Date(key + 'T12:00:00');
  const today = toKey(new Date());
  const yest  = toKey(new Date(Date.now() - 86400000));
  const label = key === today ? 'Today' : key === yest ? 'Yesterday'
    : d.toLocaleDateString('en-US',{weekday:'long'});
  const date  = d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  return { label, date };
}

// ── DAILY ─────────────────────────────────────────────────────────────────
function renderDaily() {
  const { label, date } = headingFor(curDate);
  document.getElementById('weekdayLbl').textContent = label;
  document.getElementById('dateLbl').textContent    = date;

  const dayLog = S.log[curDate] || {};
  const list   = document.getElementById('taskList');

  if (!S.tasks.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>No tasks yet.<br>Head to <strong>My Tasks</strong> to add some.</p></div>`;
  } else {
    list.innerHTML = S.tasks.map((t,i) => {
      const c   = CAT[t.cat] || CAT.other;
      const val = dayLog[t.id] !== undefined ? dayLog[t.id] : '';
      return `
        <div class="task-row" style="animation-delay:${i*.065}s">
          <div class="cat-dot ${c.cls}">${c.emoji}</div>
          <div>
            <div class="task-name">${t.name}</div>
            <div class="task-cat-label">${c.label}</div>
          </div>
          <div class="hrs-wrap">
            <input class="hrs-input" type="number" min="0" max="24" step="0.25"
              placeholder="—" value="${val}"
              oninput="logHrs('${t.id}',this.value)" />
            <span class="hrs-unit">hrs</span>
          </div>
          <button class="btn-del" onclick="clearEntry('${t.id}')" title="Clear">×</button>
        </div>`;
    }).join('');
  }

  updateTotal();
  updateSuggest();
}

function logHrs(tid, val) {
  if (!S.log[curDate]) S.log[curDate] = {};
  const h = parseFloat(val);
  if (!isNaN(h) && h >= 0) S.log[curDate][tid] = h;
  else delete S.log[curDate][tid];
  save();
  updateTotal();
}

function clearEntry(tid) {
  if (S.log[curDate]) { delete S.log[curDate][tid]; save(); }
  renderDaily();
}

function updateTotal() {
  const dayLog = S.log[curDate] || {};
  const total  = Object.values(dayLog).reduce((s,h)=>s+(parseFloat(h)||0),0);
  const disp   = total % 1 === 0 ? total : total.toFixed(2);
  document.getElementById('totalVal').innerHTML = `${disp} <small>hrs</small>`;
  const pct = Math.min(100, Math.round(total/8*100));
  let ctx = total === 0 ? 'Nothing logged yet'
    : total > 8 ? `${(total-8).toFixed(1)} hrs over a standard day`
    : `${pct}% of a standard workday`;
  document.getElementById('totalCtx').textContent = ctx;
}

function updateSuggest() {
  document.getElementById('taskSuggest').innerHTML =
    S.tasks.map(t=>`<option value="${t.name}">`).join('');
}

function quickAdd() {
  const name = document.getElementById('quickName').value.trim();
  const cat  = document.getElementById('quickCat').value;
  if (!name) return;
  let t = S.tasks.find(x => x.name.toLowerCase() === name.toLowerCase());
  if (!t) { t = { id:'task_'+Date.now(), name, cat }; S.tasks.push(t); }
  save();
  document.getElementById('quickName').value = '';
  renderDaily();
}

// ── SUMMARY ───────────────────────────────────────────────────────────────
function setPeriod(p, btn) {
  period = p;
  document.querySelectorAll('.p-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSummary();
}

function getRange(p) {
  const now = new Date();
  if (p === 'week') {
    const s = new Date(now); s.setDate(now.getDate()-now.getDay());
    return { start: toKey(s), end: toKey(now) };
  }
  if (p === 'month') {
    return { start: toKey(new Date(now.getFullYear(),now.getMonth(),1)), end: toKey(now) };
  }
  return { start:'2000-01-01', end:'2099-12-31' };
}

function renderSummary() {
  const { start, end } = getRange(period);
  const totals = {}; let grand=0; const days=new Set();
  S.tasks.forEach(t => totals[t.id]=0);

  Object.entries(S.log).forEach(([day, entries]) => {
    if (day < start || day > end) return;
    let hit = false;
    Object.entries(entries).forEach(([tid,h]) => {
      const v = parseFloat(h)||0;
      if (v>0) { totals[tid]=(totals[tid]||0)+v; grand+=v; hit=true; }
    });
    if (hit) days.add(day);
  });

  const avg = days.size>0 ? grand/days.size : 0;

  document.getElementById('statCards').innerHTML = `
    <div class="stat-card">
      <div class="stat-card-label">Total Hours</div>
      <div class="stat-card-val">${grand%1===0?grand:grand.toFixed(1)}<small>hrs</small></div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Days Logged</div>
      <div class="stat-card-val">${days.size}<small>days</small></div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Avg / Day</div>
      <div class="stat-card-val">${avg.toFixed(1)}<small>hrs</small></div>
    </div>`;

  const sorted = S.tasks
    .map(t=>({...t, hours: totals[t.id]||0}))
    .filter(t=>t.hours>0)
    .sort((a,b)=>b.hours-a.hours);

  if (!sorted.length) {
    document.getElementById('breakdown').innerHTML =
      '<div class="empty"><div class="empty-icon">📊</div><p>No hours logged in this period yet.</p></div>';
    return;
  }

  const maxH = sorted[0].hours;
  document.getElementById('breakdown').innerHTML = `
    <div class="bk-header">
      <span></span><span>Task</span><span style="text-align:right">Hours</span><span></span>
    </div>
    ${sorted.map(t=>{
      const c = CAT[t.cat]||CAT.other;
      const pct = (t.hours/maxH)*100;
      const share = grand>0?Math.round(t.hours/grand*100):0;
      return `
        <div class="bk-row">
          <div class="cat-dot ${c.cls}" style="width:30px;height:30px;font-size:13px;">${c.emoji}</div>
          <div>
            <div class="bk-name">${t.name}</div>
            <div class="bk-sub">${share}% of total</div>
          </div>
          <div class="bk-hrs">${t.hours%1===0?t.hours:t.hours.toFixed(1)}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${c.color}"></div></div>
        </div>`;
    }).join('')}`;
}

// ── MANAGE ────────────────────────────────────────────────────────────────
function renderManage() {
  const list = document.getElementById('savedList');
  if (!S.tasks.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📝</div><p>No tasks yet. Add one below.</p></div>';
    return;
  }
  list.innerHTML = S.tasks.map((t,i)=>{
    const c = CAT[t.cat]||CAT.other;
    return `
      <div class="saved-row" style="animation-delay:${i*.07}s">
        <div class="cat-dot ${c.cls}">${c.emoji}</div>
        <div class="saved-name">${t.name}</div>
        <span class="saved-badge">${c.label}</span>
        <button class="btn-del" onclick="deleteTask('${t.id}')">×</button>
      </div>`;
  }).join('');
}

function addTask() {
  const name = document.getElementById('newName').value.trim();
  const cat  = document.getElementById('newCat').value;
  if (!name || S.tasks.find(t=>t.name.toLowerCase()===name.toLowerCase())) return;
  S.tasks.push({ id:'task_'+Date.now(), name, cat });
  save();
  document.getElementById('newName').value = '';
  renderManage();
}

function deleteTask(id) {
  if (!confirm('Delete this task? Logged hours are kept.')) return;
  S.tasks = S.tasks.filter(t=>t.id!==id);
  save(); renderManage();
}

// ── BOOT ──────────────────────────────────────────────────────────────────
renderDaily();
</script>
</body>
</html>
